# ============================================================
# Nginx Reverse Proxy — EC2 Ubuntu Server
# Location: /etc/nginx/sites-available/resume2job
#
# Setup commands (run on EC2):
#   sudo ln -s /etc/nginx/sites-available/resume2job \
#               /etc/nginx/sites-enabled/resume2job
#   sudo certbot --nginx -d yourdomain.com
#   sudo nginx -t && sudo systemctl reload nginx
# ============================================================

# Redirect all HTTP → HTTPS
server {
    listen 80;
    server_name yourdomain.com www.yourdomain.com;

    # Certbot will auto-add ACME challenge location here
    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS (SSL) server
server {
    listen 443 ssl http2;
    server_name yourdomain.com www.yourdomain.com;

    # ── SSL Certificates (managed by Certbot) ────────────
    ssl_certificate     /etc/letsencrypt/live/yourdomain.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/yourdomain.com/privkey.pem;

    # Modern TLS config
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;

    # ── Security Headers ────────────────────────────────
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
    add_header X-Frame-Options DENY;
    add_header X-Content-Type-Options nosniff;
    add_header Referrer-Policy "strict-origin-when-cross-origin";
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()";

    # ── File Upload Limit ───────────────────────────────
    client_max_body_size 20M;

    # ── Proxy all requests → Frontend container (port 80) ─
    location / {
        proxy_pass         http://127.0.0.1:80;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    # ── Rate Limiting (protect /upload and /query) ──────
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/m;

    location ~ ^/(upload|query)$ {
        limit_req zone=api_limit burst=5 nodelay;
        proxy_pass       http://127.0.0.1:80;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 120s;
    }
}
