# ============================================================
# Resume2Job — GitHub Actions CI/CD
# Triggers on every push to main branch
# Steps: Lint → Test → Docker Build → Push ECR → Deploy EC2
# ============================================================

name: CI/CD Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  AWS_REGION: ap-south-1          # Change to your AWS region
  ECR_REPOSITORY: resume2job      # Your ECR repo name
  BACKEND_IMAGE: resume2job-backend
  FRONTEND_IMAGE: resume2job-frontend

jobs:
  # ──────────────────────────────────────────
  # JOB 1: Lint & Test
  # ──────────────────────────────────────────
  lint-and-test:
    name: Lint & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # ── Python backend lint ──────────────
      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      - name: Install backend dependencies
        run: |
          pip install --upgrade pip
          pip install -r backend/requirements.txt
          pip install flake8 pytest

      - name: Lint Python (flake8)
        run: |
          flake8 backend/ \
            --max-line-length=120 \
            --exclude=backend/__pycache__,backend/.venv \
            --count --statistics

      - name: Run backend tests
        env:
          APP_API_KEY: ${{ secrets.APP_API_KEY }}
        run: |
          cd backend
          python -m pytest test.py -v --tb=short || echo "No tests found, skipping"

      # ── Node frontend lint ───────────────
      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: |
          cd frontend
          npm ci --frozen-lockfile

      - name: Lint frontend (ESLint)
        run: |
          cd frontend
          npm run lint

      - name: Build frontend (verify no build errors)
        run: |
          cd frontend
          npm run build

  # ──────────────────────────────────────────
  # JOB 2: Build Docker & Push to ECR
  # (Only runs on push to main, not on PRs)
  # ──────────────────────────────────────────
  build-and-push:
    name: Build & Push Docker Images
    runs-on: ubuntu-latest
    needs: lint-and-test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    outputs:
      backend_image: ${{ steps.build-backend.outputs.image }}
      frontend_image: ${{ steps.build-frontend.outputs.image }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build & Push Backend image
        id: build-backend
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          IMAGE=$ECR_REGISTRY/$BACKEND_IMAGE:$IMAGE_TAG
          docker build -t $IMAGE ./backend
          docker push $IMAGE
          # Also tag as latest
          docker tag $IMAGE $ECR_REGISTRY/$BACKEND_IMAGE:latest
          docker push $ECR_REGISTRY/$BACKEND_IMAGE:latest
          echo "image=$IMAGE" >> $GITHUB_OUTPUT

      - name: Build & Push Frontend image
        id: build-frontend
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          IMAGE=$ECR_REGISTRY/$FRONTEND_IMAGE:$IMAGE_TAG
          docker build -t $IMAGE ./frontend
          docker push $IMAGE
          docker tag $IMAGE $ECR_REGISTRY/$FRONTEND_IMAGE:latest
          docker push $ECR_REGISTRY/$FRONTEND_IMAGE:latest
          echo "image=$IMAGE" >> $GITHUB_OUTPUT

  # ──────────────────────────────────────────
  # JOB 3: Deploy to EC2
  # ──────────────────────────────────────────
  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout code (for docker-compose.yml)
        uses: actions/checkout@v4

      - name: Deploy to EC2 via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e

            # Pull latest images
            aws ecr get-login-password --region ap-south-1 \
              | docker login --username AWS \
                --password-stdin ${{ secrets.ECR_REGISTRY }}

            docker pull ${{ secrets.ECR_REGISTRY }}/resume2job-backend:latest
            docker pull ${{ secrets.ECR_REGISTRY }}/resume2job-frontend:latest

            # Update compose file and restart
            cd /home/ubuntu/resume2job

            # Write .env from GitHub Secrets (so it never lives in repo)
            cat > .env <<EOF
            APP_API_KEY=${{ secrets.APP_API_KEY }}
            POSTGRES_USER=${{ secrets.POSTGRES_USER }}
            POSTGRES_PASSWORD=${{ secrets.POSTGRES_PASSWORD }}
            POSTGRES_DB=${{ secrets.POSTGRES_DB }}
            REDIS_PASSWORD=${{ secrets.REDIS_PASSWORD }}
            EOF

            docker compose pull
            docker compose up -d --remove-orphans

            # Clean up old images
            docker image prune -f
