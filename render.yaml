services:
  # 1. Redis Cache
  - type: redis
    name: resume2job-redis
    ipAllowList: [] # only allow internal connections
    plan: free
    maxmemoryPolicy: noeviction

databases:
  # 2. PostgreSQL Database
  - name: resume2job-db
    plan: free
    postgresMajorVersion: 16

  # 3. Flask Backend
  - type: web
    name: resume2job-backend
    env: python
    buildCommand: "pip install -r backend/requirements.txt"
    startCommand: "gunicorn -b 0.0.0.0:$PORT -w 4 'backend.app:app'"
    envVars:
      - key: FLASK_ENV
        value: production
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: resume2job-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: resume2job-redis
          property: connectionString
      - key: APP_API_KEY
        sync: false # You must set this manually in Render dashboard
      - key: PINECONE_API_KEY
        sync: false # You must set this manually in Render dashboard
      - key: PINECONE_INDEX_NAME
        value: resume2job-index
    autoDeploy: false # Triggered by GitHub Actions
