version: "3.9"

# ─────────────────────────────────────────────
# Networks
# ─────────────────────────────────────────────
networks:
  app_network:
    driver: bridge   # All services talk inside this private network

# ─────────────────────────────────────────────
# Volumes (persistent data)
# ─────────────────────────────────────────────
volumes:
  postgres_data:    # Survives container restarts (like RDS)
  redis_data:
  uploads_data:     # Shared uploaded_files between restarts

# ─────────────────────────────────────────────
# Services
# ─────────────────────────────────────────────
services:

  # ── Flask Backend ──────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: resume2job_backend
    restart: unless-stopped
    env_file:
      - .env                        # Secrets loaded from .env (never hardcoded)
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      - REDIS_URL=redis://redis:6379/0
    volumes:
      - uploads_data:/app/uploaded_files   # Persist uploaded files
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - app_network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ── React Frontend (Nginx) ──────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: resume2job_frontend
    restart: unless-stopped
    ports:
      - "80:80"      # Public port — only frontend is exposed to internet
    depends_on:
      - backend
    networks:
      - app_network

  # ── PostgreSQL (RDS-style) ──────────────────
  # In production replace this with AWS RDS in a Private Subnet.
  # Connection string stays identical → zero code change needed.
  db:
    image: postgres:16-alpine
    container_name: resume2job_db
    restart: unless-stopped
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - app_network
    # Database is NOT exposed to host (no ports: section) → private like RDS
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis Cache ─────────────────────────────
  # Use for session caching, rate-limiting, or background job queues
  redis:
    image: redis:7-alpine
    container_name: resume2job_redis
    restart: unless-stopped
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis_data:/data
    networks:
      - app_network
    # Redis also NOT exposed to host
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
